<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no"/>
<title>Sildesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
:root{
  --accent:var(--accent);--accent-light:#818cf8;--accent-dark:#4f46e5;--accent-glow:color-mix(in srgb, var(--accent) 25%, transparent);
  --glass-bg:rgba(255,255,255,.07);--glass-bg-hover:rgba(255,255,255,.11);
  --glass-border:rgba(255,255,255,.12);--glass-border-hover:rgba(255,255,255,.2);
  --glass-blur:14px;
  --font-sans:'DM Sans',system-ui,sans-serif;
  --text-primary:rgba(255,255,255,.95);--text-secondary:rgba(255,255,255,.55);--text-tertiary:rgba(255,255,255,.3);
  --radius-sm:10px;--radius-md:16px;--radius-lg:20px;--radius-xl:28px;
  --shadow-card:0 4px 24px rgba(0,0,0,.35),0 1px 4px rgba(0,0,0,.2);
  --shadow-card-hover:0 16px 48px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.3);
  --shadow-modal:0 24px 80px rgba(0,0,0,.6);
  --ease-out-expo:cubic-bezier(.16,1,.3,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --sidebar-w:60px;--gap-grid:16px;--card-min-w:200px;--card-col-w:200px;--card-row-h:100px;--btn-text:white;--panel-bg:#14161e;
}

body{font-family:var(--font-sans);background:#0f1117;color:var(--text-primary);min-height:100vh;overflow:hidden}
#app{display:flex;height:100vh;width:100vw;position:relative;overflow:hidden}

.vela-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;transition:filter .38s ease}
.vela-bg-overlay{position:fixed;inset:0;z-index:1;pointer-events:none}
.vela-sidebar{animation:sidebarEntrance .5s cubic-bezier(.25,.46,.45,.94) both;position:relative;z-index:10;width:var(--sidebar-w);height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:6px;background:rgba(0,0,0,.18);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border-right:1px solid rgba(255,255,255,.07);flex-shrink:0;transition:width .15s ease}.sidebar-resizer{position:absolute;top:0;right:0;width:5px;height:100%;z-index:30;opacity:0;transition:opacity .2s;cursor:default;pointer-events:none}.sidebar-resizer{cursor:col-resize;pointer-events:auto}.edit-sidebar .sidebar-resizer:hover,.sidebar-resizer.active{opacity:1}.sidebar-resizer::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:var(--accent);opacity:.7}
.sidebar-logo{width:40px;height:40px;margin-bottom:10px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-size:15px;font-weight:600;letter-spacing:-.5px;cursor:pointer;transition:transform .15s var(--ease-spring);overflow:hidden}.sidebar-logo:has(img){background:transparent;box-shadow:none}
.sidebar-logo:hover{transform:scale(1.08)}
.sidebar-spacer{flex:1}
.sidebar-btn{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));transition:color .15s ease,background .15s ease,transform .15s var(--ease-spring),filter .15s ease;border:none;background:transparent}
.sidebar-btn:hover{color:var(--accent-light);background:rgba(255,255,255,.08);filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
.sidebar-btn.active{color:var(--accent-light);background:color-mix(in srgb, var(--accent) 15%, transparent)}
.sidebar-btn svg{width:18px;height:18px}
.board-pill{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);cursor:pointer;transition:background .15s ease,transform .15s var(--ease-spring)}
.board-pill.active{background:var(--accent-light);transform:scale(1.4)}
.vela-main{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.vela-header{animation:slideDown .45s cubic-bezier(.25,.46,.45,.94) both;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0;height:56px;background:rgba(0,0,0,.18);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border-bottom:1px solid rgba(255,255,255,.07)}
.header-board-name{font-size:15px;font-weight:500;color:var(--text-primary);letter-spacing:-.2px}
.header-spacer{flex:1}
.vela-clock{}
.search-trigger{display:flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-radius:var(--radius-lg);background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);cursor:pointer;color:var(--text-secondary);font-size:13px;font-family:var(--font-sans);transition:background .15s ease,border-color .15s ease,color .15s ease;white-space:nowrap}
.search-trigger:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-hover);color:var(--text-secondary)}
.search-trigger svg{width:14px;height:14px}
.search-kbd{font-size:10px;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-family:var(--font-sans);color:var(--text-tertiary);margin-left:4px}
.btn-add-card{display:flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:var(--radius-lg);background:var(--accent);border:none;cursor:pointer;color:var(--btn-text);font-size:13px;font-weight:500;font-family:var(--font-sans);transition:background .15s ease,transform .15s var(--ease-spring),box-shadow .15s ease;box-shadow:0 2px 12px var(--accent-glow);white-space:nowrap}
.btn-add-card:hover{background:var(--accent-light);transform:scale(1.03);box-shadow:0 4px 20px var(--accent-glow)}
.btn-add-card svg{width:14px;height:14px}
.vela-grid{flex:1;overflow:auto;padding:24px 28px 40px;display:grid;grid-template-columns:repeat(auto-fill,var(--card-col-w));grid-auto-rows:var(--card-row-h);gap:var(--gap-grid);align-content:start;grid-auto-flow:row dense;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;position:relative;min-height:0;min-width:0;overflow-x:auto;overflow-y:auto}
.vela-card{position:relative;z-index:2;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(140%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(140%);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:14px 14px 12px;cursor:pointer;display:flex;flex-direction:column;gap:0;min-height:100px;box-shadow:var(--shadow-card);transition:transform .28s var(--ease-out-expo),box-shadow .28s var(--ease-out-expo),background .2s ease,border-color .2s ease;outline:none;text-decoration:none;overflow:hidden;will-change:transform;animation:cardEntrance .5s cubic-bezier(.25,.46,.45,.94) both}
.vela-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
.vela-card:hover{transform:translateY(-4px) scale(1.012);box-shadow:0 12px 36px rgba(0,0,0,.45),0 3px 10px rgba(0,0,0,.25);background:var(--glass-bg-hover);border-color:rgba(255,255,255,.14);}
.vela-card:active{transform:translateY(-2px) scale(1.008);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.vela-card.is-dragging{opacity:.85;transform:scale(1.04) rotate(1.5deg);box-shadow:var(--shadow-card-hover),0 0 0 2px var(--accent);cursor:grabbing;z-index:100}
.vela-card.drag-over{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 12%, transparent)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.card-info{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text-primary);letter-spacing:-.2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-subtitle{font-size:11px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-icon-wrap{width:57px;height:57px;border-radius:14px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:24px;line-height:1}
.card-icon-wrap img{width:100%;height:100%;object-fit:contain}
.card-icon-wrap svg{width:29px;height:29px;color:var(--text-secondary)}
.card-domain{font-size:10.5px;color:var(--text-secondary);letter-spacing:.01em;margin-top:auto}
.card-badge{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;box-shadow:0 0 6px currentColor}
.card-actions{position:absolute;bottom:10px;right:12px;display:flex;gap:4px;opacity:0;transform:translateY(4px);transition:opacity .15s ease,transform .15s var(--ease-out-expo)}
.vela-card:hover .card-actions{opacity:0;transform:translateY(4px)}
.card-editing:hover .card-actions{opacity:1;transform:translateY(0)}
.card-action-btn{width:26px;height:26px;border-radius:8px;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:background .15s ease,color .15s ease}
.card-action-btn:hover{background:rgba(0,0,0,.65);color:var(--text-primary)}
.card-action-btn.danger:hover{background:rgba(239,68,68,.3);color:#f87171}
.card-action-btn svg{width:12px;height:12px}
[data-card-size="small"]{--card-min-w:160px;--card-col-w:160px;--gap-grid:12px;--card-row-h:90px}
[data-card-size="small"] .vela-card{min-height:80px;padding:11px 12px;border-radius:var(--radius-md)}
[data-card-size="small"] .card-icon-wrap{width:44px;height:44px;border-radius:11px}
[data-card-size="large"]{--card-min-w:260px;--card-col-w:260px;--gap-grid:20px;--card-row-h:120px}
[data-card-size="large"] .vela-card{min-height:140px;padding:22px;border-radius:var(--radius-xl)}
[data-card-size="large"] .card-icon-wrap{width:70px;height:70px;border-radius:16px}
[data-card-size="large"] .card-title{font-size:15px}
[data-density="compact"]{--gap-grid:10px}
[data-density="spacious"]{--gap-grid:24px}
.vela-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;animation:fadeIn .24s var(--ease-out-expo)}
.vela-modal{background:var(--panel-bg,rgba(20,22,30,.92));backdrop-filter:blur(40px) saturate(160%);-webkit-backdrop-filter:blur(40px) saturate(160%);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-xl);box-shadow:var(--shadow-modal);width:520px;max-width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .38s var(--ease-out-expo)}
.modal-header{display:flex;align-items:center;padding:20px 24px 18px;border-bottom:1px solid rgba(255,255,255,.06);gap:12px}

.modal-title{font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:-.3px;flex:1}
.modal-close{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:background .15s ease}
.modal-close:hover{background:rgba(255,255,255,.12)}
.modal-close svg{width:14px;height:14px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
.modal-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:flex-end;gap:10px}

.settings-modal{width:700px;max-width:96vw;height:min(580px,92vh)}
.settings-layout{display:flex;height:100%;overflow:hidden;}
.settings-sidebar{width:180px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);padding:12px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}

.settings-nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:400;transition:background .15s ease,color .15s ease;border:none;background:transparent;font-family:var(--font-sans);text-align:left;width:100%}
.settings-nav-item svg{width:15px;height:15px;flex-shrink:0}
.settings-nav-item:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.settings-nav-item.active{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--text-primary);font-weight:500}
.settings-content{flex:1;padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:24px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;min-height:0}
.settings-section-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);opacity:.6;margin-bottom:12px}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}

.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;color:var(--text-primary);font-weight:400}
.settings-hint{font-size:11px;color:var(--text-secondary);opacity:.7;margin-top:2px}
.vela-toggle{position:relative;width:40px;height:24px;flex-shrink:0}
.vela-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,.15);transition:background .24s ease;cursor:pointer}
.vela-toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .24s var(--ease-spring);pointer-events:none}
.vela-toggle input:checked~.toggle-thumb{transform:translateX(16px)}
.vela-slider{-webkit-appearance:none;appearance:none;width:140px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);outline:none;cursor:pointer;accent-color:var(--accent)}
.vela-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 2px 8px var(--accent-glow);cursor:pointer;transition:transform .15s var(--ease-spring)}
.vela-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.vela-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-sans);font-size:13px;padding:8px 12px;outline:none;width:100%;transition:border-color .15s ease,background .15s ease}

.vela-input:focus{border-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, transparent)}
.vela-input::placeholder{color:var(--text-tertiary)}
.vela-select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-sans);font-size:13px;padding:7px 10px;outline:none;cursor:pointer}
.vela-segmented{display:flex;background:rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:3px;gap:2px}
.seg-btn{flex:1;padding:6px 12px;border-radius:7px;border:none;background:transparent;color:var(--text-secondary);font-family:var(--font-sans);font-size:12px;font-weight:400;cursor:pointer;transition:background .15s ease,color .15s ease}
.seg-btn.active{background:rgba(255,255,255,.14);color:var(--text-primary);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background .15s ease,transform .15s var(--ease-spring),box-shadow .15s ease;outline:none}
.btn-primary{background:var(--accent);color:var(--btn-text);box-shadow:0 2px 10px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-light);transform:scale(1.02)}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text-primary);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.13)}
.btn-ghost{background:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:rgba(255,255,255,.06);color:var(--text-primary)}
.btn svg{width:14px;height:14px}
.search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;padding-top:18vh;animation:fadeIn .15s ease}
.search-box{width:560px;max-width:94vw;background:var(--panel-bg,rgba(18,20,28,.96));backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-xl);box-shadow:var(--shadow-modal);overflow:hidden;animation:slideDown .38s var(--ease-out-expo)}
.search-input-wrap{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.search-input-wrap svg{width:16px;height:16px;color:var(--text-tertiary);flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-family:var(--font-sans);font-size:15px}
.search-input::placeholder{color:var(--text-tertiary)}
.search-results{padding:8px;max-height:400px;overflow-y:auto}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s ease}
.search-result-item:hover,.search-result-item.selected{background:color-mix(in srgb, var(--accent) 14%, transparent)}
.search-result-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.search-result-icon img{width:100%;height:100%;object-fit:contain}
.search-result-icon svg{width:15px;height:15px;color:var(--text-secondary)}
.search-result-title{font-size:13px;color:var(--text-primary);font-weight:400}
.search-result-url{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.vela-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--text-tertiary);text-align:center}
.vela-empty svg{width:48px;height:48px;opacity:.3}
.vela-empty h3{font-size:15px;font-weight:500;color:var(--text-secondary)}
.vela-empty p{font-size:13px;max-width:260px;line-height:1.6}
.vela-toasts{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.vela-toast{background:rgba(20,22,30,.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-md);padding:12px 16px;font-size:13px;color:var(--text-primary);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideUp .24s var(--ease-out-expo);pointer-events:all;display:flex;align-items:center;gap:8px;max-width:320px}
.vela-toast.success{border-color:rgba(34,197,94,.3)}
.vela-toast.error{border-color:rgba(239,68,68,.3)}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.sync-nudge{position:fixed;bottom:24px;right:24px;z-index:9998;background:rgba(18,20,28,.96);backdrop-filter:blur(24px) saturate(1.4);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px 18px;box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);width:300px;animation:slideUp .28s var(--ease-out-expo);pointer-events:all}
.sync-nudge-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sync-nudge-sub{font-size:11px;color:var(--text-tertiary);margin-bottom:14px;line-height:1.5}
.sync-nudge-actions{display:flex;gap:8px}
.sync-nudge-actions .btn{flex:1;padding:8px 10px;font-size:12px;border-radius:10px}
.sync-nudge-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 6px var(--accent)}
.sync-nudge-dot.green{background:#22c55e;box-shadow:0 0 6px #22c55e}
.vela-toast.success .toast-dot{background:#22c55e}
.vela-toast.error .toast-dot{background:#ef4444}
.sync-status-bar{position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:28px;display:flex;align-items:center;padding:0 20px;gap:8px;font-size:11px;color:var(--text-tertiary);background:rgba(0,0,0,.1);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.04);z-index:20}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--text-tertiary)}
.sync-dot.ok{background:#22c55e}
.sync-dot.error{background:#ef4444}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardEntrance{
  0%{opacity:0;transform:translateY(20px) scale(.94)}
  60%{opacity:1;transform:translateY(-4px) scale(1.01)}
  80%{transform:translateY(2px) scale(.995)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes sidebarEntrance{0%{opacity:0;transform:translateX(-16px)}60%{opacity:1;transform:translateX(2px)}100%{opacity:1;transform:translateX(0)}}
@keyframes speedProgress{from{width:0}to{width:100%}}
@keyframes widgetEntrance{
  0%{opacity:0;transform:scale(.88) translateY(16px)}
  55%{opacity:1;transform:scale(1.02) translateY(-3px)}
  75%{transform:scale(.99) translateY(1px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
[data-animations="false"] *,[data-animations="false"] *::before,[data-animations="false"] *::after{animation:none!important;transition:none!important}


/* ── Widget type selector buttons ── */
.widget-type-btn{padding:20px;border-radius:var(--radius-lg);border:1px solid var(--glass-border);background:var(--glass-bg);cursor:pointer;text-align:left;transition:background .15s,border-color .15s;display:flex;flex-direction:column;gap:10px}
.widget-type-btn:hover{background:var(--glass-bg-hover);border-color:var(--accent)}
/* ── Calendar day hover ── */
.cal-day{text-align:center;font-size:11px;padding:3px 2px;border-radius:6px;cursor:pointer;position:relative;transition:background .1s}
.cal-day:hover{background:rgba(255,255,255,.08)}
.cal-today{background:var(--accent)!important;color:var(--btn-text)!important;font-weight:600}
/* ── Football suggestion buttons ── */
.fb-suggest-btn{font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;background:transparent;color:var(--text-secondary);transition:background .1s}
.fb-suggest-btn:hover{background:rgba(255,255,255,.06)}
/* ── Widgets ── */
.vela-widget{display:flex;flex-direction:column;cursor:default;position:relative;z-index:3;container-type:size;container-name:widget;}
.vela-widget.card-editing{cursor:grab;}
.vela-widget a{text-decoration:none}
.vela-widget a:hover{opacity:.8;}
.vela-widget textarea:focus{outline:none;}

/* ── Widget compact mode for narrow (1-col) widgets ── */
.vela-widget[style*="span 1"]{padding:10px 10px 8px;}

/* Narrow widget (1 col) */
@container widget (max-width: 220px) {
  .widget-scroll-body{font-size:11px}
  .widget-scroll-body a{padding:4px 0!important}
  .widget-scroll-body div[style*="font-size:12px"]{font-size:11px!important}
  .widget-scroll-body div[style*="font-size:14px"]{font-size:12px!important}
  .widget-scroll-body div[style*="font-size:22px"]{font-size:16px!important}
  .widget-scroll-body div[style*="font-size:13px"]{font-size:11px!important}
  .widget-scroll-body button[style*="font-size:12px"]{font-size:11px!important;padding:5px 8px!important}
  .widget-scroll-body svg[style*="width:90px"]{width:66px!important;height:66px!important}
  .widget-scroll-body input{font-size:11px!important;padding:4px 7px!important}
  .widget-scroll-body img[style*="width:14px"]{width:12px!important;height:12px!important}
}
/* Short widget (1 row ≈ <130px height) */
@container widget (max-height: 130px) {
  .widget-scroll-body{overflow:hidden}
}
/* Very small widget */
@container widget (max-width: 220px) and (max-height: 250px) {
  .widget-scroll-body div[style*="gap:10px"]{gap:6px!important}
  .widget-scroll-body div[style*="padding:20px"]{padding:8px 0!important}
}
.widget-resize-handle:hover{opacity:1!important;background:rgba(0,0,0,.65)!important;}

/* ── Edit Mode Button ── */
.edit-mode-btn{display:flex;align-items:center;gap:6px;padding:0 12px;height:36px;border-radius:var(--radius-lg);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease;}
.edit-mode-btn svg{width:14px;height:14px}
.edit-mode-btn:hover{background:rgba(255,255,255,0.1);color:var(--text-primary)}
.edit-mode-btn.active{background:color-mix(in srgb, var(--accent) 18%, transparent);border-color:var(--accent);color:var(--accent-light)}
/* edit-toolbar removed — gap slider is now inline in header */

  --panel-bg:#f0f0f7;

[data-theme="light"] .vela-main{background:#eeeef5;}
[data-theme="light"] .vela-card{background:rgba(255,255,255,0.9)!important;border-color:rgba(0,0,0,0.07)!important;box-shadow:0 1px 8px rgba(0,0,0,0.08);}
[data-theme="light"] .vela-card:hover{background:rgba(255,255,255,1)!important;}
[data-theme="light"] .card-title{color:#1a1a2e!important;}
[data-theme="light"] .card-domain{color:#666677!important;}
[data-theme="light"] .vela-modal{background:#f2f2f8!important;color:#1a1a2e;}
[data-theme="light"] .modal-header{background:#e8e8f2!important;border-bottom-color:rgba(0,0,0,0.08)!important;}
[data-theme="light"] .vela-input{background:rgba(0,0,0,0.06)!important;color:#1a1a2e!important;border-color:rgba(0,0,0,0.15)!important;}
[data-theme="light"] .settings-label{color:#1a1a2e!important;}
[data-theme="light"] .settings-hint{color:#666677!important;}
[data-theme="light"] .settings-section-title{color:#444455!important;}

[data-theme="light"] .seg-btn{color:#444455!important;}

/* Edit mode: show grid overlay hint */
/* ::before grid lines removed — using dot grid instead */

/* ── Grid reorder animation ── */
.vela-grid.edit-active .vela-card{transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s ease,opacity .2s ease!important}
.vela-grid.edit-active .vela-card:not(.dragging){cursor:grab}

.drop-placeholder{background:color-mix(in srgb,var(--accent) 8%,transparent);border:2px dashed var(--accent);border-radius:var(--radius-lg);opacity:.6;pointer-events:none;animation:none!important}

/* ── Drag edge arrows ── */
